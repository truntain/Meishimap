<header class="header" id="main-header">
  <a href="#" class="header__logo" data-action="go-home">
    <span>MESHI<span class="header__logo-accent">MAP</span></span>
  </a>

  <nav class="header__nav" id="desktop-nav">
    <a href="#" class="header__nav-link" data-page="home" data-action="nav-home">Trang chủ</a>
    <a href="#" class="header__nav-link" data-page="search" data-action="nav-search">Tìm kiếm</a>
    <a href="#" class="header__nav-link" data-page="booking" data-action="nav-booking">Đặt bàn</a>
  </nav>

  <div class="header__actions">
    <button class="header__lang btn" data-action="toggle-lang" aria-label="Chuyển ngôn ngữ">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7.5" stroke="#6C2F00" stroke-width="1.2"/><path d="M9 1.5C9 1.5 6 4.5 6 9s3 7.5 3 7.5M9 1.5C9 1.5 12 4.5 12 9s-3 7.5-3 7.5M1.5 9h15" stroke="#6C2F00" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span data-lang-label>VN / JP</span>
    </button>
    <div class="header__divider"></div>
    <a href="#" class="btn btn--login" id="btn-login" data-action="nav-login">Đăng nhập</a>
  </div>

  <button class="header__hamburger" data-action="toggle-menu" aria-label="Mở menu">
    <span></span><span></span><span></span>
  </button>

  <div class="header__mobile-menu" id="mobile-menu">
    <a href="#" class="header__nav-link" data-action="nav-home">Trang chủ</a>
    <a href="#" class="header__nav-link" data-action="nav-search">Tìm kiếm</a>
    <a href="#" class="header__nav-link" data-action="nav-booking">Đặt bàn</a>
    <a href="#" class="btn btn--login" style="margin-top:8px" data-action="nav-login">Đăng nhập</a>
  </div>
</header>
